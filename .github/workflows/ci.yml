name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.0
          cache: true

      - name: Install dependencies
        run: pixi run install

      - name: Run Linting
        run: |
          pixi run python -m pip install ruff
          pixi run ruff check src/

      - name: Run Mock Tests
        run: pixi run test-mock

      - name: Run Consensus Tests
        run: pixi run test
